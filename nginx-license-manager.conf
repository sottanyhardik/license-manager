# Nginx configuration for license-manager.duckdns.org
# Server IP: 143.110.252.201
# HTTP → HTTPS redirect + full HTTPS block (after certbot sets up SSL)

# ── New backend (parallel-run) ────────────────────────────────────────────────
# Routes /api/v1/ to backendv1 (port 8001) during the parallel-run phase.
# Remove this upstream and the /api/v1/ location block when cutting over:
#   change /api/ proxy_pass → backendv1, stop legacy gunicorn, reload nginx.
upstream backendv1 {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ── HTTP — redirect to HTTPS + Let's Encrypt challenge ───────────────────────
server {
    listen 80;
    server_name 143.110.252.201 license-manager.duckdns.org;

    client_max_body_size 100M;

    # Let's Encrypt ACME challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://license-manager.duckdns.org$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name license-manager.duckdns.org;

    # SSL — managed by Certbot (paths filled in after: sudo certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/license-manager.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license-manager.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Frontend (React/Vite build) — legacy app during parallel-run
    # Switch to /home/django/license-manager/frontend/dist at cutover.
    root /home/django/license-manager/legacy/frontend/dist;
    index index.html;

    # Static files — legacy app during parallel-run
    location /static/ {
        alias /home/django/license-manager/legacy/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media served only via the authenticated /api/media/<path> view + X-Accel-Redirect
    # Backend must set env MEDIA_X_ACCEL_REDIRECT=/protected-media/.
    location /protected-media/ {
        internal;
        alias /home/django/license-manager/legacy/backend/media/;
    }

    # New backend API (parallel-run) — must appear BEFORE the legacy /api/ block
    location /api/v1/ {
        proxy_pass         http://backendv1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_set_header   Accept-Encoding   "";
    }

    # Legacy Django API — proxy to legacy gunicorn (port 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Frontend assets
    location /assets/ {
        alias /home/django/license-manager/legacy/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
