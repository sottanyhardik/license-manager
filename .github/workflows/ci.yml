name: CI

# Runs the same quality gates locally used for the License Manager:
#   frontend: eslint + tsc + vitest + vite build
#   backend:  pytest (Django 6 / Python 3.14) against Postgres + Redis services
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (pytest · Django 6 / py3.14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lmanagement
          POSTGRES_USER: lmanagement
          POSTGRES_PASSWORD: lmanagement
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: lmanagement.settings
      TESTING: "true"
      SECRET_KEY: ci-not-a-secret-key-for-tests-only
      DB_NAME: lmanagement
      DB_USER: lmanagement
      DB_PASS: lmanagement
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: System libs (libpq for psycopg)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Migrations check (no missing migrations)
        run: python manage.py makemigrations --check --dry-run

      - name: Backend tests (canonical suite — required gate)
        run: pytest tests/ -p no:cacheprovider

      # Advisory: the app-level tests (balance math, plan cases, core utils) exist
      # but the project runner only ran tests/. Surface them without blocking CI;
      # once confirmed green, promote this into the required gate above.
      - name: App-level tests (advisory — balance/duty math, core utils)
        continue-on-error: true
        run: pytest apps/license/tests apps/core/tests --import-mode=importlib -p no:cacheprovider

  mds:
    name: Master-Data Service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: master-data-service

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: master_data
          POSTGRES_USER: master_data
          POSTGRES_PASSWORD: master_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U master_data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: mds.settings
      SECRET_KEY: ci-not-a-secret-key-for-tests-only
      MDS_DB_NAME: master_data
      MDS_DB_USER: master_data
      MDS_DB_PASS: master_data
      MDS_DB_HOST: localhost
      MDS_DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: System libs (libpq for psycopg)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: master-data-service/requirements-test.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Migrations check (no missing migrations)
        run: python manage.py makemigrations --check --dry-run

      - name: Tests
        run: pytest -p no:cacheprovider

  mds-client:
    name: mds-client (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mds-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "Django>=6" requests
      - name: Tests (Django runner, in-memory sqlite)
        run: python runtests.py
