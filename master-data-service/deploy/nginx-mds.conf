# Nginx site for the Master-Data Service (ADR-001).
# Domain:  masters.internal.example.com   (replace with the real internal host)
# Backend: gunicorn on 127.0.0.1:8100 (see deploy/gunicorn.conf.py + mds.service)
#
# Install:
#   sudo cp master-data-service/deploy/nginx-mds.conf /etc/nginx/sites-available/mds
#   sudo ln -sf /etc/nginx/sites-available/mds /etc/nginx/sites-enabled/mds
#   sudo nginx -t && sudo systemctl reload nginx     # ALWAYS test before reload — never blind-reload
#
# TLS: issue a cert first (reuse the repo pattern setup-ssl-labdhi.sh /
# setup-ssl-tractor.sh, i.e. certbot --nginx -d masters.internal.example.com).
# Until the cert exists, only the port-80 server below will validate; keep the
# 443 block commented or run certbot which fills the ssl_certificate lines.

# ── HTTP — ACME challenge + redirect everything else to HTTPS ───────────────
server {
    listen 80;
    server_name masters.internal.example.com;

    # Let's Encrypt HTTP-01 challenge (certbot webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://masters.internal.example.com$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name masters.internal.example.com;

    # TLS — placeholders; certbot --nginx rewrites/uncomments these. The
    # options-ssl-nginx.conf + ssl-dhparams.pem come from the certbot package
    # (same convention as nginx-labdhi.conf in this repo).
    ssl_certificate     /etc/letsencrypt/live/masters.internal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masters.internal.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # bulk_upsert payloads (consolidation / initial hydration) can be large.
    client_max_body_size 50M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # --- Security headers (applied to every response, incl. errors) ---------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # --- Admin static (served by whitenoise via gunicorn, or directly if you
    #     point this alias at STATIC_ROOT after collectstatic). Serving from
    #     disk is cheaper than proxying; adjust the path to the checkout. ----
    location /static/ {
        alias /home/mds/master-data-service/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Health probe — passthrough, no access-log noise --------------------
    location = /healthz {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    # --- Everything else → gunicorn -----------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
