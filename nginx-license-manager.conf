# Nginx configuration for license-manager.duckdns.org
# Server IP: 143.110.252.201
# HTTP → HTTPS redirect + full HTTPS block (after certbot sets up SSL)

# ── HTTP — redirect to HTTPS + Let's Encrypt challenge ───────────────────────
server {
    listen 80;
    server_name 143.110.252.201 license-manager.duckdns.org;

    client_max_body_size 100M;

    # Let's Encrypt ACME challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://license-manager.duckdns.org$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name license-manager.duckdns.org;

    # SSL — managed by Certbot (paths filled in after: sudo certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/license-manager.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license-manager.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Frontend (React/Vite build)
    root /home/django/license-manager/frontend/dist;
    index index.html;

    # Static files
    location /static/ {
        alias /home/django/license-manager/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (BOE PDFs, uploads)
    location /media/ {
        alias /home/django/license-manager/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django API — proxy to THIS server's local gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Frontend assets
    location /assets/ {
        alias /home/django/license-manager/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
