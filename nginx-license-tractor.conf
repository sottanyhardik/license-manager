# Nginx configuration for license-tractor.duckdns.org
upstream backendv1 {
    server 127.0.0.1:8001;
    keepalive 32;
}

# Server IP: 165.232.185.220

# ── HTTP — redirect to HTTPS + Let's Encrypt challenge ───────────────────────
server {
    listen 80;
    server_name 165.232.185.220 license-tractor.duckdns.org;

    # client_max_body_size removed: port 80 only redirects, body limit is dead config

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://license-tractor.duckdns.org$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name license-tractor.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/license-tractor.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license-tractor.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 30s;   # reduced from 300s — mitigates Slow Loris
    send_timeout 300s;
    proxy_connect_timeout 10s;   # loopback: 10s is generous; was 300s
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    root /home/django/license-manager/legacy/frontend/dist;
    index index.html;

    location /static/ {
        alias /home/django/license-manager/legacy/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /protected-media/ {
        internal;
        alias /home/django/license-manager/legacy/backend/media/;
    }

    # New backend (parallel-run) — must appear BEFORE legacy /api/ block
    location /api/v1/ {
        proxy_pass         http://backendv1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Accept-Encoding header removed — stripping it disabled gzip compression
        proxy_redirect     off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # was hardcoded "https"
        proxy_redirect off;
    }

    # /admin/ — restrict to trusted IPs in production.
    # To apply: add your office/VPN CIDRs and uncomment the allow/deny lines.
    # Example:
    #   allow 203.0.113.10/32;   # office IP
    #   allow 10.8.0.0/24;       # VPN subnet
    #   deny  all;
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # was hardcoded "https"
        proxy_redirect off;
    }

    location /assets/ {
        alias /home/django/license-manager/legacy/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection removed — obsolete; can cause issues in modern browsers
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
