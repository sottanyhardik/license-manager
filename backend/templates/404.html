<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Page Not Found</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
        }

        body {
            align-items: center;
            background: #f7f8fb;
            color: #172033;
            display: flex;
            margin: 0;
            min-height: 100vh;
        }

        main {
            margin: 0 auto;
            max-width: 42rem;
            padding: 3rem 1.5rem;
        }

        .status {
            color: #50627f;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            line-height: 1.05;
            margin: 0.5rem 0 1rem;
        }

        p {
            color: #4c5d78;
            font-size: 1.0625rem;
            margin: 0 0 1.5rem;
        }

        a {
            background: #174ea6;
            border-radius: 0.375rem;
            color: #fff;
            display: inline-block;
            font-weight: 700;
            padding: 0.75rem 1rem;
            text-decoration: none;
        }

        a:focus,
        a:hover {
            background: #0f3d82;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #111827;
                color: #f8fafc;
            }

            .status,
            p {
                color: #cbd5e1;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="status">404 error</div>
        <h1>Page not found</h1>
        <p>The page you requested could not be found. Check the address or return to the application.</p>
        <a href="/">Return to application</a>
    </main>
</body>
</html>
