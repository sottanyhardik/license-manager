# Secure media serving — replaces the PUBLIC `location /media/` block.
#
# BEFORE (vulnerable) in nginx-license-manager.conf:
#     location /media/ {
#         alias /path/to/backend/media/;
#         expires 7d;
#         add_header Cache-Control "public";      # <-- anyone could download
#     }
#
# AFTER: delete the block above and use the two blocks below. Downloads now go
# through Django (which checks authentication), and Django hands the byte-serving
# back to nginx via X-Accel-Redirect from an `internal;` location (fast, no bytes
# through gunicorn). Requires backend env: MEDIA_X_ACCEL_REDIRECT=/protected-media/
#
# The authenticated app route /api/media/<path> is already proxied by the existing
# `location /api/` block — no change needed there.

# Internal location: only reachable via X-Accel-Redirect from Django, never directly.
location /protected-media/ {
    internal;
    alias /path/to/backend/media/;          # <-- set to your MEDIA_ROOT
    # No `add_header Cache-Control public;` — these are per-user authorized docs.
}
