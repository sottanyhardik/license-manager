# nginx-v1.conf — Parallel-run routing snippet
#
# PURPOSE
# -------
# During the parallel-run phase, route /api/v1/ to the new backend (port 8001)
# while everything else continues to hit the legacy backend (port 8000).
# This block is ADDITIVE — insert it into the existing HTTPS server block;
# do NOT replace the existing config.
#
# INSTALLATION
# ------------
# 1. Add the upstream block at the top level of your nginx config
#    (outside any server {} block), or in /etc/nginx/conf.d/backendv1-upstream.conf.
# 2. Paste the location /api/v1/ block BEFORE any existing legacy location blocks
#    in your HTTPS server {} block.
# 3. Validate: sudo nginx -t
# 4. Reload:   sudo systemctl reload nginx
#
# ROLLBACK (parallel-run)
# -----------------------
# Remove the location /api/v1/ block and reload nginx.  The upstream block is
# harmless to leave in place but can be removed if desired.
#
# CUTOVER (after ADR-009 criteria met)
# ------------------------------------
# 1. Change the legacy proxy_pass location from 127.0.0.1:8000 to backendv1
#    (or simply rename the upstream server to 8000 after legacy is stopped).
# 2. Remove this /api/v1/ split location — all traffic goes through one block.
# 3. Stop legacy: sudo supervisorctl stop license-manager license-manager-celery
# 4. sudo nginx -t && sudo systemctl reload nginx
#
# ─────────────────────────────────────────────────────────────────────────────
# STEP 1: Add this upstream block at the http {} level (outside server {})
# ─────────────────────────────────────────────────────────────────────────────

upstream backendv1 {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2: Add this location block inside the existing HTTPS server {} block,
#         BEFORE the legacy catch-all proxy_pass location.
# ─────────────────────────────────────────────────────────────────────────────

location /api/v1/ {
    proxy_pass         http://backendv1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Required for HTTP/1.1 keepalive to the upstream to work (see keepalive 32 above).
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;

    # Let Django handle gzip; do not double-compress.
    proxy_set_header   Accept-Encoding   "";
}
