[project]
name = "license-manager-backend"
version = "1.0.0"
description = "License Manager — Django 6.x backend"
requires-python = ">=3.13"

[tool.uv]
package = false

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "C901"]
ignore = [
    "E402",   # module-import-not-at-top — intentional lazy imports to avoid circular imports
    "N806",   # non-lowercase-variable-in-function — Django convention (User, Model classes assigned in functions)
    "N818",   # error-suffix-on-exception-name — domain exception PartnerTradeNotFound is a LookupError variant
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "F841",   # unused-variable — test mocks are often assigned but only used as context managers
]
"backend/tests/**" = [
    "F841",   # same — when ruff is run from repo root rather than backend/
]
"*/migrations/*" = [
    "E501",   # line-too-long — Django auto-generated migrations are verbose; line length not enforced
]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.black]
line-length = 120
target-version = ["py313"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--strict-markers"

[tool.coverage.run]
source = ["."]
branch = true
omit = ["*/migrations/*", "*/tests/*", "manage.py", "*/settings/*"]

[tool.coverage.report]
show_missing = true
