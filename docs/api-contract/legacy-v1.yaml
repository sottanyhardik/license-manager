# License Manager — Legacy API Contract
# Source: legacy/backend/lmanagement/urls.py + per-app urls.py files
# All paths are prefixed with the base URL of the legacy backend (port 8000).
# Authentication: Authorization: Bearer <access_token> on all endpoints except
# /api/auth/login/, /api/auth/refresh/, /api/health/, and /api/mds/status/.
#
# Parity tracker: set parity_status to "done" as each endpoint is implemented
# in backend/ (new v1 Django app, port 8001, prefix /api/v1/).

endpoints:

  # -------------------------------------------------------------------------
  # SYSTEM
  # -------------------------------------------------------------------------
  system:
    - path: /api/health/
      method: GET
      auth: none
      description: Health check; returns service status
      new_path: /api/v1/health/
      parity_status: done

    - path: /api/mds/status/
      method: GET
      auth: none
      description: Market data source status
      new_path: /api/v1/mds/status/
      parity_status: done

    - path: /api/schema/
      method: GET
      auth: none (debug) / JWT (production)
      description: OpenAPI 3 schema (drf-spectacular)
      new_path: /api/v1/schema/
      parity_status: done

    - path: /api/docs/
      method: GET
      auth: none (debug) / JWT (production)
      description: Swagger UI for interactive API exploration
      new_path: /api/v1/docs/
      parity_status: done

    - path: /api/redoc/
      method: GET
      auth: none (debug) / JWT (production)
      description: ReDoc UI for API documentation
      new_path: /api/v1/redoc/
      parity_status: done

    - path: /api/media/{path}
      method: GET
      auth: JWT
      description: Protected media/document download (replaces public /media/)
      new_path: /api/v1/media/{path}
      parity_status: done

  # -------------------------------------------------------------------------
  # AUTH  (mounted at /api/auth/)
  # Source: legacy/backend/apps/accounts/urls.py
  # -------------------------------------------------------------------------
  auth:
    - path: /api/auth/login/
      method: POST
      auth: none
      description: Authenticate with username+password; returns {access, refresh, user}
      new_path: /api/v1/auth/login/
      parity_status: done

    - path: /api/auth/logout/
      method: POST
      auth: JWT
      description: Blacklist the supplied refresh token
      new_path: /api/v1/auth/logout/
      parity_status: done

    - path: /api/auth/me/
      method: GET
      auth: JWT
      description: Return authenticated user's profile
      new_path: /api/v1/auth/me/
      parity_status: done

    - path: /api/auth/me/
      method: PUT
      auth: JWT
      description: Replace own profile fields
      new_path: /api/v1/auth/me/
      parity_status: done

    - path: /api/auth/me/
      method: PATCH
      auth: JWT
      description: Partially update own profile fields
      new_path: /api/v1/auth/me/
      parity_status: done

    - path: /api/auth/refresh/
      method: POST
      auth: none
      description: Exchange a valid refresh token for a new access token (SimpleJWT TokenRefreshView)
      new_path: /api/v1/auth/refresh/
      parity_status: done

    - path: /api/auth/password-reset/
      method: POST
      auth: none
      description: Request a password-reset e-mail
      new_path: /api/v1/auth/password-reset/
      parity_status: done

    - path: /api/auth/password-reset-confirm/
      method: POST
      auth: none
      description: Submit token+new password to complete the reset
      new_path: /api/v1/auth/password-reset-confirm/
      parity_status: done

    - path: /api/auth/users/
      method: GET
      auth: JWT+role (USER_MANAGER or superuser)
      description: List all application users (paginated)
      new_path: /api/v1/auth/users/
      parity_status: done

    - path: /api/auth/users/
      method: POST
      auth: JWT+role (USER_MANAGER or superuser)
      description: Create a new user account
      new_path: /api/v1/auth/users/
      parity_status: done

    - path: /api/auth/users/{id}/
      method: GET
      auth: JWT+role (USER_MANAGER or superuser)
      description: Retrieve a single user by primary key
      new_path: /api/v1/auth/users/{id}/
      parity_status: done

    - path: /api/auth/users/{id}/
      method: PUT
      auth: JWT+role (USER_MANAGER or superuser)
      description: Replace a user record
      new_path: /api/v1/auth/users/{id}/
      parity_status: done

    - path: /api/auth/users/{id}/
      method: PATCH
      auth: JWT+role (USER_MANAGER or superuser)
      description: Partially update a user record
      new_path: /api/v1/auth/users/{id}/
      parity_status: done

    - path: /api/auth/users/{id}/
      method: DELETE
      auth: JWT+role (USER_MANAGER or superuser)
      description: Delete a user account
      new_path: /api/v1/auth/users/{id}/
      parity_status: done

    - path: /api/auth/users/{id}/reset-password/
      method: POST
      auth: JWT+role (USER_MANAGER or superuser)
      description: Admin-initiated password reset for a given user
      new_path: /api/v1/auth/users/{id}/reset-password/
      parity_status: done

    - path: /api/auth/users/available_roles/
      method: GET
      auth: JWT
      description: List the 15 available role codes that can be assigned to users
      new_path: /api/v1/auth/users/available_roles/
      parity_status: done

